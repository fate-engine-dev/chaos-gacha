<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chaos Gacha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0905;
    --bg2: #100f0a;
    --bg3: #161410;
    --border: rgba(180,160,100,0.12);
    --border-hover: rgba(180,160,100,0.28);
    --gold: #c8a96e;
    --gold-dim: #7a6540;
    --gold-bright: #e8c98a;
    --text: #e8e0cc;
    --text-dim: #8a8070;
    --text-muted: #4a4438;
    --common: #7a7870;
    --common-bg: #1a1916;
    --uncommon: #4a8a5a;
    --uncommon-bg: #0f1f13;
    --rare: #3a6ea8;
    --rare-bg: #0c1826;
    --epic: #7a4ab8;
    --epic-bg: #180f2a;
    --legendary: #b87020;
    --legendary-bg: #241408;
    --card-w: 320px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(200,169,110,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(120,80,200,0.05) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  .page {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1rem 4rem;
  }

  .header {
    text-align: center;
    margin-bottom: 3.5rem;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.1s forwards;
  }

  .header-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 0.75rem;
  }

  .header-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--gold);
    line-height: 1;
    text-shadow: 0 0 60px rgba(200,169,110,0.25);
    margin-bottom: 0.5rem;
  }

  .header-sub {
    font-size: 1rem;
    color: var(--text-dim);
    font-style: italic;
    font-weight: 300;
  }

  .stage {
    width: var(--card-w);
    height: 420px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 2.5rem;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    opacity: 1;
    transition: opacity 0.3s;
  }

  .empty-state.hidden { opacity: 0; pointer-events: none; }

  .empty-orb {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    animation: orbPulse 3s ease-in-out infinite;
  }

  @keyframes orbPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(200,169,110,0); border-color: rgba(180,160,100,0.12); }
    50% { box-shadow: 0 0 30px 4px rgba(200,169,110,0.08); border-color: rgba(180,160,100,0.28); }
  }

  .empty-text {
    font-size: 0.85rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    font-family: 'DM Mono', monospace;
  }

  .card {
    position: absolute;
    width: var(--card-w);
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.75rem 1.5rem 1.5rem;
    opacity: 0;
    transform: translateY(24px) scale(0.95);
    transition: none;
    pointer-events: none;
  }

  .card.reveal {
    animation: cardReveal 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    pointer-events: auto;
  }

  .card.exit {
    animation: cardExit 0.25s ease forwards;
  }

  @keyframes cardReveal {
    0% { opacity: 0; transform: translateY(24px) scale(0.95); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes cardExit {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-12px) scale(0.97); }
  }

  .card[data-rarity="uncommon"] { border-color: rgba(74,138,90,0.35); }
  .card[data-rarity="rare"] { border-color: rgba(58,110,168,0.45); }
  .card[data-rarity="epic"] { border-color: rgba(122,74,184,0.5); box-shadow: 0 0 30px rgba(122,74,184,0.1); }
  .card[data-rarity="legendary"] {
    border-color: rgba(184,112,32,0.6);
    box-shadow: 0 0 50px rgba(184,112,32,0.15), 0 0 100px rgba(184,112,32,0.06);
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 1.25rem;
  }

  .card-icon-wrap {
    width: 52px; height: 52px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
  }

  .card-meta { text-align: right; }

  .card-type {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .rarity-badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid;
  }

  .rarity-badge.common   { color: var(--common);    border-color: var(--common);    background: var(--common-bg); }
  .rarity-badge.uncommon { color: var(--uncommon);  border-color: var(--uncommon);  background: var(--uncommon-bg); }
  .rarity-badge.rare     { color: var(--rare);      border-color: var(--rare);      background: var(--rare-bg); }
  .rarity-badge.epic     { color: var(--epic);      border-color: var(--epic);      background: var(--epic-bg); }
  .rarity-badge.legendary{ color: var(--legendary); border-color: var(--legendary); background: var(--legendary-bg); }

  .card-divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 1.1rem;
  }

  .card-name {
    font-family: 'Cinzel', serif;
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 0.6rem;
    letter-spacing: 0.03em;
  }

  .card[data-rarity="legendary"] .card-name { color: var(--gold-bright); }
  .card[data-rarity="epic"] .card-name { color: #c4a0f0; }

  .card-desc {
    font-size: 0.95rem;
    line-height: 1.7;
    color: #9a9080;
    font-style: italic;
    font-weight: 300;
  }

  .card-stars {
    display: flex;
    gap: 4px;
    margin-top: 1.25rem;
    justify-content: flex-end;
  }

  .star {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
  }

  .star.lit { background: var(--gold); box-shadow: 0 0 6px rgba(200,169,110,0.5); }
  .card[data-rarity="epic"] .star.lit { background: #9a70e0; box-shadow: 0 0 6px rgba(154,112,224,0.5); }
  .card[data-rarity="legendary"] .star.lit { background: var(--legendary); box-shadow: 0 0 8px rgba(184,112,32,0.7); }

  .legendary-flash {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(184,112,32,0.18) 0%, transparent 70%);
    opacity: 0;
    pointer-events: none;
    z-index: 99;
  }

  .legendary-flash.fire {
    animation: flash 1.2s ease forwards;
  }

  @keyframes flash {
    0% { opacity: 0; }
    20% { opacity: 1; }
    100% { opacity: 0; }
  }

  .roll-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.4s forwards;
  }

  .roll-btn {
    position: relative;
    width: 200px;
    padding: 1rem 0;
    background: transparent;
    border: 1px solid var(--gold-dim);
    border-radius: 8px;
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, box-shadow 0.2s, transform 0.1s;
    overflow: hidden;
  }

  .roll-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 80% at 50% 50%, rgba(200,169,110,0.08) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .roll-btn:hover { border-color: var(--gold); color: var(--gold-bright); box-shadow: 0 0 20px rgba(200,169,110,0.1); }
  .roll-btn:hover::before { opacity: 1; }
  .roll-btn:active { transform: scale(0.97); }
  .roll-btn:disabled { opacity: 0.4; cursor: default; transform: none; }
  .roll-btn span { position: relative; z-index: 1; }

  .roll-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  .history-section {
    margin-top: 3.5rem;
    width: 100%;
    max-width: 700px;
    opacity: 0;
    transition: opacity 0.6s;
  }

  .history-section.visible { opacity: 1; }

  .history-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 1rem;
    text-align: center;
  }

  .history-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .history-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px 5px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg2);
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    animation: chipIn 0.3s ease forwards;
    opacity: 0;
  }

  @keyframes chipIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .history-chip .chip-icon { font-size: 14px; }
  .history-chip.common   { border-color: rgba(122,120,112,0.25); }
  .history-chip.uncommon { border-color: rgba(74,138,90,0.3); color: #4a8a5a; }
  .history-chip.rare     { border-color: rgba(58,110,168,0.35); color: #3a6ea8; }
  .history-chip.epic     { border-color: rgba(122,74,184,0.4); color: #9a60e0; }
  .history-chip.legendary{ border-color: rgba(184,112,32,0.5); color: var(--legendary); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 380px) {
    :root { --card-w: 290px; }
    .stage { height: 400px; }
  }
</style>
</head>
<body>

<div class="legendary-flash" id="lflash"></div>

<div class="page">
  <header class="header">
    <div class="header-eyebrow">Character Mode · v0.1</div>
    <h1 class="header-title">Chaos Gacha</h1>
    <p class="header-sub">Roll the unknown. Claim what emerges.</p>
  </header>

  <div class="stage" id="stage">
    <div class="empty-state" id="emptyState">
      <div class="empty-orb">✦</div>
      <span class="empty-text">awaiting your roll</span>
    </div>
    <div class="card" id="card">
      <div class="card-top">
        <div class="card-icon-wrap" id="cIcon"></div>
        <div class="card-meta">
          <div class="card-type" id="cType"></div>
          <span class="rarity-badge" id="cRarity"></span>
        </div>
      </div>
      <div class="card-divider"></div>
      <div class="card-name" id="cName"></div>
      <div class="card-desc" id="cDesc"></div>
      <div class="card-stars" id="cStars"></div>
    </div>
  </div>

  <div class="roll-area">
    <button class="roll-btn" id="rollBtn" onclick="roll()">
      <span id="btnLabel">Roll</span>
    </button>
    <span class="roll-count" id="rollCount">0 rolls</span>
  </div>

  <div class="history-section" id="historySection">
    <div class="history-label">Roll history</div>
    <div class="history-grid" id="historyGrid"></div>
  </div>
</div>

<script>
const CARDS = [
  { type:"Ability", icon:"⚡", name:"Static Pulse", rarity:"common", stars:1,
    desc:"You can release bursts of electrical energy from your palms. Enough to stun a man, or charge a dead phone." },
  { type:"Ability", icon:"🌊", name:"Tidecall", rarity:"uncommon", stars:2,
    desc:"Water within 30 meters bends to your will. Rivers slow, rain lifts upward, and tears freeze mid-cheek." },
  { type:"Ability", icon:"🔥", name:"Soulflame", rarity:"rare", stars:3,
    desc:"You burn — not with fire, but with purpose. Wounds close faster. Fear burns away. So do lies." },
  { type:"Ability", icon:"🌀", name:"Void Step", rarity:"epic", stars:4,
    desc:"Once per hour you may step sideways through space. No sound. No trace. Just the faint smell of absence." },
  { type:"Ability", icon:"☀️", name:"Sunborn", rarity:"legendary", stars:5,
    desc:"You were kissed by something ancient. Light bends around you. Darkness refuses to stay. Gods notice." },
  { type:"Ability", icon:"🧊", name:"Still Air", rarity:"common", stars:1,
    desc:"You can make a room go absolutely silent. Useful in libraries. Terrifying in arguments." },
  { type:"Ability", icon:"🌑", name:"Umbral Touch", rarity:"uncommon", stars:2,
    desc:"Whatever you hold in darkness becomes invisible. The darkness doesn't need to be total. Just enough." },
  { type:"Ability", icon:"🩸", name:"Blood Pact", rarity:"rare", stars:3,
    desc:"A wound made by your hand becomes a contract. The injured party cannot willingly harm you for seven days." },
  { type:"Ability", icon:"💀", name:"Necrospeak", rarity:"epic", stars:4,
    desc:"The recently dead can hear you. They rarely answer. When they do, they are always right." },
  { type:"Ability", icon:"⚗️", name:"The Transmutation", rarity:"legendary", stars:5,
    desc:"You may change one thing about reality per moon. Small things. The size of a lie. The color of grief. The weight of a name." },
  { type:"Trait", icon:"🧠", name:"Eidetic Memory", rarity:"uncommon", stars:2,
    desc:"You forget nothing. Every face, every insult, every map you glanced at in a dream. A blessing and a curse." },
  { type:"Trait", icon:"🦴", name:"Ironblood", rarity:"common", stars:1,
    desc:"Your bones are harder than they should be. Doctors are confused. You are not." },
  { type:"Trait", icon:"👁️", name:"The Third Sight", rarity:"rare", stars:3,
    desc:"You see intent before action. Not the future — just a half-second delay the world hasn't corrected yet." },
  { type:"Trait", icon:"🌒", name:"Shade-born", rarity:"epic", stars:4,
    desc:"Shadows do not fall on you correctly. They follow a different you — one that moves with more confidence." },
  { type:"Trait", icon:"🕯️", name:"Cursed Luck", rarity:"common", stars:1,
    desc:"Things go wrong for you, then go right, then go wrong in ways that save your life. You've stopped questioning it." },
  { type:"Trait", icon:"🌿", name:"Root Memory", rarity:"uncommon", stars:2,
    desc:"Plants remember you. They lean toward you. Old forests whisper your name to each other when you pass." },
  { type:"Trait", icon:"🐺", name:"Apex Instinct", rarity:"rare", stars:3,
    desc:"You know when something is about to attack. Not through logic. Through something older. You're never wrong." },
  { type:"Trait", icon:"⚖️", name:"Sovereign Will", rarity:"legendary", stars:5,
    desc:"You cannot be compelled. Not by magic, not by torture, not by love. Your choices are entirely your own. This is lonelier than it sounds." },
  { type:"Item", icon:"🗡️", name:"Forgetful Blade", rarity:"uncommon", stars:2,
    desc:"A knife that makes wounds forget to hurt. Useful in many ways. Dangerous in most of them." },
  { type:"Item", icon:"📿", name:"Waystone Necklace", rarity:"common", stars:1,
    desc:"Always points home. The definition of home is debated." },
  { type:"Item", icon:"📖", name:"The Unwritten Book", rarity:"rare", stars:3,
    desc:"A leather journal with 300 blank pages. Whatever you write in it by morning has happened by noon." },
  { type:"Item", icon:"🪞", name:"Mirror of Becoming", rarity:"legendary", stars:5,
    desc:"Shows you who you could have been. Some people can't put it down. Some smash it immediately. Both are correct." },
  { type:"Item", icon:"🧲", name:"The Binding Coin", rarity:"uncommon", stars:2,
    desc:"Flip it to make a deal. The coin ensures both parties keep their word. It has never been wrong. It has never been kind." },
  { type:"Item", icon:"⌛", name:"Borrowed Hour", rarity:"epic", stars:4,
    desc:"A pocket watch that runs backward. Break it to undo the last hour of your life. It only works once. You've been carrying it for years." },
  { type:"Item", icon:"🎭", name:"The Hollow Mask", rarity:"rare", stars:3,
    desc:"Wear it to become someone else. Not in appearance — in soul. People believe you are them completely. You start to, as well." },
  { type:"Item", icon:"🗺️", name:"Dead Man's Map", rarity:"common", stars:1,
    desc:"A map of a place that doesn't exist yet. The roads look familiar." },
  { type:"Familiar", icon:"🦊", name:"Ember Fox", rarity:"uncommon", stars:2,
    desc:"A small fox with a perpetually warm tail. Loyal, clever, and absolutely uninterested in your enemies." },
  { type:"Familiar", icon:"🦅", name:"The Pale Hawk", rarity:"rare", stars:3,
    desc:"Flies ahead. Returns with information it shouldn't have. Never explains how." },
  { type:"Familiar", icon:"🐉", name:"Ashling", rarity:"legendary", stars:5,
    desc:"A dragon the size of a cat who insists it is not a dragon. Do not argue. It will remember." },
  { type:"Familiar", icon:"🐈‍⬛", name:"The Nameless Cat", rarity:"common", stars:1,
    desc:"Follows you. You did not invite it. It has saved your life twice and you still don't know its name." },
  { type:"Familiar", icon:"🌙", name:"Moonshade Hound", rarity:"epic", stars:4,
    desc:"A wolf made of the space between stars. Only visible at night. Only loyal when it chooses to be." },
  { type:"Familiar", icon:"🦋", name:"The Oracle Moth", rarity:"uncommon", stars:2,
    desc:"Lands on the thing you need to pay attention to. Has never been wrong. Is deeply inconvenient about it." },
  { type:"Title", icon:"👑", name:"The Undefeated", rarity:"epic", stars:4,
    desc:"You have not yet lost. Whether through skill, luck, or the quiet mercy of fate — you are still standing." },
  { type:"Title", icon:"🕊️", name:"Peacemaker", rarity:"common", stars:1,
    desc:"People calm down around you. Wars have ended because you walked into the room. You're tired." },
  { type:"Title", icon:"🔱", name:"Twice-Judged", rarity:"rare", stars:3,
    desc:"You have stood before a court of some kind — mortal, divine, or otherwise — and walked out both times." },
  { type:"Title", icon:"⚰️", name:"The One Who Returns", rarity:"legendary", stars:5,
    desc:"You have died. Officially. There is paperwork. You are inconveniently alive and no one knows what to do with you." },
  { type:"Title", icon:"🎯", name:"The Marked", rarity:"uncommon", stars:2,
    desc:"Something powerful chose you for a reason it has not shared. People can sense it. Most step aside." },
  { type:"Title", icon:"🧩", name:"Wildcard", rarity:"rare", stars:3,
    desc:"You don't fit any prophecy. You don't fit any category. This makes you the most dangerous thing in the room." },
];

const WEIGHTS = { common:40, uncommon:30, rare:18, epic:9, legendary:3 };
let rollCount = 0;
let rolling = false;
let historyShown = false;

function buildPool() {
  const pool = [];
  CARDS.forEach(c => {
    const w = WEIGHTS[c.rarity] || 1;
    for (let i = 0; i < w; i++) pool.push(c);
  });
  return pool;
}

const POOL = buildPool();

function pick() { return POOL[Math.floor(Math.random() * POOL.length)]; }

function stars(n) {
  let h = '';
  for (let i = 1; i <= 5; i++) h += `<div class="star${i <= n ? ' lit' : ''}"></div>`;
  return h;
}

function roll() {
  if (rolling) return;
  rolling = true;
  const btn = document.getElementById('rollBtn');
  const label = document.getElementById('btnLabel');
  const card = document.getElementById('card');
  const empty = document.getElementById('emptyState');
  btn.disabled = true;
  label.textContent = 'Rolling…';
  if (card.classList.contains('reveal')) {
    card.classList.remove('reveal');
    card.classList.add('exit');
    setTimeout(showCard, 280);
  } else {
    empty.classList.add('hidden');
    setTimeout(showCard, 120);
  }
}

function showCard() {
  const result = pick();
  const card = document.getElementById('card');
  card.classList.remove('exit');
  document.getElementById('cIcon').textContent = result.icon;
  document.getElementById('cType').textContent = result.type;
  document.getElementById('cName').textContent = result.name;
  document.getElementById('cDesc').textContent = result.desc;
  document.getElementById('cStars').innerHTML = stars(result.stars);
  const badge = document.getElementById('cRarity');
  badge.textContent = result.rarity.charAt(0).toUpperCase() + result.rarity.slice(1);
  badge.className = 'rarity-badge ' + result.rarity;
  card.setAttribute('data-rarity', result.rarity);
  if (result.rarity === 'legendary') {
    const flash = document.getElementById('lflash');
    flash.classList.remove('fire');
    void flash.offsetWidth;
    flash.classList.add('fire');
  }
  card.classList.add('reveal');
  rollCount++;
  document.getElementById('rollCount').textContent = rollCount + (rollCount === 1 ? ' roll' : ' rolls');
  addHistory(result);
  document.getElementById('rollBtn').disabled = false;
  document.getElementById('btnLabel').textContent = 'Roll Again';
  rolling = false;
}

function addHistory(c) {
  const section = document.getElementById('historySection');
  const grid = document.getElementById('historyGrid');
  if (!historyShown) { section.classList.add('visible'); historyShown = true; }
  const chip = document.createElement('div');
  chip.className = `history-chip ${c.rarity}`;
  chip.innerHTML = `<span class="chip-icon">${c.icon}</span><span>${c.name}</span>`;
  grid.prepend(chip);
  while (grid.children.length > 20) grid.removeChild(grid.lastChild);
}
</script>
</body>
</html>
